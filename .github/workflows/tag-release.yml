name: Tag release

# Runs on every push to main (i.e. every merged PR). If pyproject.toml's
# [project].version was bumped as part of that PR and no matching git tag
# exists yet, create the tag + a GitHub Release for it. That Release is
# what triggers publish.yml -- nothing gets published unless a human
# deliberately bumped the version number in a reviewed PR.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, needed to check for an existing tag

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # need 3.11+ for stdlib tomllib below

      - name: Read version from pyproject.toml
        id: version
        run: |
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --title "$tag" --generate-notes
