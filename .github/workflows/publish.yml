name: Publish to PyPI

# Fires when tag-release.yml creates a GitHub Release. Builds the sdist +
# a macOS/arm64 wheel and uploads both to PyPI via Trusted Publishing
# (OIDC) -- no API token stored in this repo. Requires a one-time setup
# step on pypi.org; see README's "Releasing" section.
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: macos-14
    environment: pypi # optional extra gate: add required reviewers to this
    # GitHub Environment (Settings -> Environments) if you
    # want a manual approval click before every publish.
    permissions:
      id-token: write # required for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
